name: CD — Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          echo "## Changes" > CHANGELOG.md
          git log $(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref, 'rc') || contains(github.ref, 'beta') }}

  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'staging' }}
    runs-on: ubuntu-latest
    needs: release
    if: always()
    environment: ${{ github.event.inputs.environment || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Build Docker image
        run: |
          docker build -t tradingbot:${{ github.sha }} .

      # Deploy steps depend on your infrastructure.
      # Examples:
      #
      # SSH deploy:
      # - name: Deploy via SSH
      #   uses: appleboy/ssh-action@v1
      #   with:
      #     host: ${{ secrets.DEPLOY_HOST }}
      #     username: ${{ secrets.DEPLOY_USER }}
      #     key: ${{ secrets.DEPLOY_KEY }}
      #     script: |
      #       cd /opt/tradingbot
      #       docker pull ghcr.io/${{ github.repository }}:latest
      #       docker compose up -d
      #
      # Kubernetes:
      # - name: Deploy to K8s
      #   run: |
      #     kubectl set image deployment/tradingbot \
      #       tradingbot=ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deployment placeholder
        run: |
          echo "Deployment target: ${{ github.event.inputs.environment || 'staging' }}"
          echo "Image: tradingbot:${{ github.sha }}"
          echo "Configure deployment secrets and uncomment deploy steps above."
